name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Verify the package imports cleanly (headless)
        run: python -c "import jarvis, jarvis.assistant; print('jarvis', jarvis.__version__, 'imports OK')"

      - name: Run tests
        run: pytest -q
